<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif;color:white}
.box{text-align:center;padding:20px}
.icon{font-size:60px;margin-bottom:20px}
.title{font-size:22px;font-weight:bold;margin-bottom:10px}
.sub{font-size:14px;color:#aaa;margin-bottom:30px}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:15px 40px;border-radius:25px;font-size:16px;cursor:pointer;width:100%;max-width:300px}
.loader{width:50px;height:50px;border:4px solid #333;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<div class="box" id="mainBox">
  <div class="icon">🎬</div>
  <div class="title">Terastream Bot</div>
  <div class="sub">Watch a short ad to unlock your file</div>
  <div class="loader" id="loader"></div>
  <div id="status" style="color:#aaa;font-size:14px">Loading ad...</div>
</div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setHeaderColor("#1a1a2e");
tg.setBackgroundColor("#1a1a2e");

async function init() {
  try {
    const AdController = window.Adsgram.init({ blockId: "bot-25385", debug: false });
    document.getElementById("status").innerText = "Ad ready! Starting...";
    setTimeout(async () => {
      try {
        await AdController.show();
        document.getElementById("status").innerText = "Ad complete! Getting your file...";
        document.getElementById("loader").style.display = "none";
        tg.sendData(JSON.stringify({action:"ad_watched",ts:Date.now()}));
        setTimeout(() => tg.close(), 1500);
      } catch(e) {
        document.getElementById("status").innerText = "Ad skipped. Getting your file anyway...";
        tg.sendData(JSON.stringify({action:"ad_skipped",ts:Date.now()}));
        setTimeout(() => tg.close(), 1500);
      }
    }, 1000);
  } catch(e) {
    document.getElementById("status").innerText = "Ad unavailable. Getting your file...";
    tg.sendData(JSON.stringify({action:"ad_error",ts:Date.now()}));
    setTimeout(() => tg.close(), 1500);
  }
}

init();
</script>
</body>
</html>
