<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terastream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif;color:white}
.box{text-align:center;padding:30px 20px;width:100%}
.title{font-size:24px;font-weight:bold;margin-bottom:8px;color:#a78bfa}
.sub{font-size:14px;color:#888;margin-bottom:30px}
.loader{width:60px;height:60px;border:5px solid #222;border-top:5px solid #a78bfa;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:15px;color:#ccc;margin-top:15px;min-height:40px}
.done{font-size:40px;margin-bottom:10px}
.green{color:#4ade80}
</style>
</head>
<body>
<div class="box">
  <div class="title">Terastream Bot</div>
  <div class="sub">Unlock your file with a short ad</div>
  <div class="loader" id="loader"></div>
  <div class="status" id="status">Loading ad... Please wait</div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function showDone() {
  document.getElementById("loader").style.display = "none";
  document.querySelector(".box").innerHTML = 
    '<div class="done">✅</div>' +
    '<div class="title green">Ad Complete!</div>' +
    '<div class="sub">Your file is being sent...</div>';
}

async function init() {
  try {
    setStatus("Initializing ad...");
    const AdController = window.Adsgram.init({
      blockId: "bot-25385",
      debug: false,
      debugBannerType: "FullscreenMedia"
    });
    setStatus("Ad ready! Loading...");
    await new Promise(r => setTimeout(r, 800));
    try {
      await AdController.show();
      showDone();
      tg.sendData(JSON.stringify({action:"ad_watched"}));
      setTimeout(() => tg.close(), 2000);
    } catch(e) {
      showDone();
      tg.sendData(JSON.stringify({action:"ad_skipped"}));
      setTimeout(() => tg.close(), 1500);
    }
  } catch(e) {
    showDone();
    tg.sendData(JSON.stringify({action:"ad_error",msg:String(e)}));
    setTimeout(() => tg.close(), 1500);
  }
}

window.onload = init;
</script>
</body>
</html>
